<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="35%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#161810"/>
      <stop offset="100%" stop-color="#0b0c0e"/>
    </radialGradient>
    <!-- Gold gradient -->
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#aa7700"/>
    </linearGradient>
    <!-- Flame gradient -->
    <linearGradient id="flameG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="55%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Glow -->
    <radialGradient id="glowLeft" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="30%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowLeft)"/>
  <rect width="1200" height="630" fill="url(#glowGreen)"/>

  <!-- Garis dekorasi atas & bawah -->
  <rect x="0" y="0" width="1200" height="3" fill="#ffd700" opacity="0.3"/>
  <rect x="0" y="627" width="1200" height="3" fill="#00ff88" opacity="0.2"/>

  <!-- Pattern titik-titik halus di background -->
  <g opacity="0.04" fill="#ffd700">
    <circle cx="100" cy="100" r="2"/><circle cx="200" cy="60" r="1.5"/>
    <circle cx="350" cy="120" r="1"/><circle cx="500" cy="80" r="2"/>
    <circle cx="700" cy="50" r="1.5"/><circle cx="900" cy="90" r="1"/>
    <circle cx="1050" cy="130" r="2"/><circle cx="1150" cy="70" r="1.5"/>
    <circle cx="80" cy="250" r="1"/><circle cx="1120" cy="200" r="1.5"/>
    <circle cx="150" cy="500" r="2"/><circle cx="1080" cy="520" r="1"/>
    <circle cx="300" cy="570" r="1.5"/><circle cx="900" cy="580" r="2"/>
  </g>

  <!-- ══ LOGO LENTERA (kiri) ══ -->
  <g transform="translate(120, 165) scale(3)">
    <!-- Glow -->
    <ellipse cx="50" cy="75" rx="30" ry="12" fill="#ffd700" opacity="0.08"/>
    <!-- Pegangan -->
    <path d="M 42,24 Q 42,18 50,18 Q 58,18 58,24"
      fill="none" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Badan lentera -->
    <polygon points="50,28 64,36 64,60 50,68 36,60 36,36"
      fill="#ffd700" opacity="0.08"/>
    <polygon points="50,28 64,36 64,60 50,68 36,60 36,36"
      fill="none" stroke="url(#goldG)" stroke-width="2"/>
    <!-- Silang dalam -->
    <line x1="50" y1="28" x2="50" y2="68" stroke="#ffd700" stroke-width="0.7" opacity="0.2"/>
    <line x1="36" y1="36" x2="64" y2="60" stroke="#ffd700" stroke-width="0.7" opacity="0.2"/>
    <line x1="64" y1="36" x2="36" y2="60" stroke="#ffd700" stroke-width="0.7" opacity="0.2"/>
    <!-- Api -->
    <path d="M 50,28 Q 45,20 48,13 Q 50,8 52,13 Q 55,20 50,28 Z"
      fill="url(#flameG)"/>
    <!-- Alas -->
    <rect x="36" y="68" width="28" height="4" rx="2" fill="url(#goldG)" opacity="0.8"/>
    <rect x="40" y="72" width="20" height="3" rx="1.5" fill="url(#goldG)" opacity="0.45"/>
  </g>

  <!-- Garis vertikal pemisah -->
  <line x1="420" y1="100" x2="420" y2="530" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ══ TEKS KANAN ══ -->
  <!-- Teks Arab kecil atas -->
  <text x="520" y="185"
    font-family="serif"
    font-size="28"
    fill="#00ff88"
    opacity="0.6"
    letter-spacing="2">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</text>

  <!-- Judul utama -->
  <text x="518" y="295"
    font-family="Georgia, serif"
    font-size="72"
    font-weight="bold"
    fill="#ffd700"
    letter-spacing="-1">Ilmu Agama Islam</text>

  <!-- Garis bawah judul -->
  <rect x="518" y="310" width="580" height="2" rx="1" fill="#ffd700" opacity="0.2"/>
  <rect x="518" y="310" width="120" height="2" rx="1" fill="#00ff88" opacity="0.6"/>

  <!-- Subjudul -->
  <text x="520" y="360"
    font-family="Georgia, serif"
    font-size="28"
    fill="#aaaaaa"
    letter-spacing="4">MANHAJ SALAF</text>

  <!-- Deskripsi -->
  <text x="520" y="420"
    font-family="Arial, sans-serif"
    font-size="22"
    fill="#666666">Aqidah  ·  Fiqih  ·  Nahwu  ·  Shorof  ·  Siroh</text>

  <!-- URL -->
  <text x="520" y="510"
    font-family="Arial, sans-serif"
    font-size="18"
    fill="#00ff88"
    opacity="0.5"
    letter-spacing="1">website-aqidah.netlify.app</text>
</svg>
