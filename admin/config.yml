backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

locale: 'id'

collections:

  # ── HALAMAN UTAMA ──────────────────────────────────────────
  - name: "halaman-utama"
    label: "🏠 Halaman Utama"
    files:
      - name: "beranda"
        label: "Beranda (Mata Pelajaran & Kartu)"
        file: "config/site.json"
        fields:
          - name: "judul_website"
            label: "Judul Website"
            widget: "string"
          - name: "mapel"
            label: "Mata Pelajaran"
            widget: "list"
            summary: "{{fields.judul}}"
            fields:
              - name: "judul"
                label: "Judul Mata Pelajaran"
                widget: "string"
              - name: "kartu"
                label: "Kartu-kartu"
                widget: "list"
                summary: "{{fields.nama}}"
                fields:
                  - name: "nama"
                    label: "Nama Kartu"
                    widget: "string"
                  - name: "link"
                    label: "Link Halaman"
                    widget: "string"

  # ── MATERI ──────────────────────────────────────────────────
  - name: "materi"
    label: "📚 Materi"
    files:

      - name: "tauhid"
        label: "Tauhid"
        file: "content/materi/data/tauhid.json"
        fields:
          - name: "judul"
            label: "Judul Halaman"
            widget: "string"
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - name: "id"
                label: "ID (huruf kecil, tanpa spasi)"
                widget: "string"
              - name: "nama"
                label: "Nama Kelompok"
                widget: "string"
              - name: "konten"
                label: "Konten"
                widget: "markdown"

      - name: "bidah"
        label: "Bid'ah"
        file: "content/materi/data/bidah.json"
        fields:
          - name: "judul"
            label: "Judul Halaman"
            widget: "string"
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - name: "id"
                label: "ID (huruf kecil, tanpa spasi)"
                widget: "string"
              - name: "nama"
                label: "Nama Kelompok"
                widget: "string"
              - name: "konten"
                label: "Konten"
                widget: "markdown"

      - name: "sifat"
        label: "Sifat Allah"
        file: "content/materi/data/sifat.json"
        fields:
          - name: "judul"
            label: "Judul Halaman"
            widget: "string"
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - name: "id"
                label: "ID (huruf kecil, tanpa spasi)"
                widget: "string"
              - name: "nama"
                label: "Nama Kelompok"
                widget: "string"
              - name: "konten"
                label: "Konten"
                widget: "markdown"

      - name: "iman"
        label: "Iman"
        file: "content/materi/data/iman.json"
        fields:
          - name: "judul"
            label: "Judul Halaman"
            widget: "string"
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - name: "id"
                label: "ID (huruf kecil, tanpa spasi)"
                widget: "string"
              - name: "nama"
                label: "Nama Kelompok"
                widget: "string"
              - name: "konten"
                label: "Konten"
                widget: "markdown"

      - name: "abu-syuja"
        label: "Matan Abu Syuja'"
        file: "content/materi/data/abu-syuja.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "umdatul-ahkam"
        label: "Umdatul Ahkam"
        file: "content/materi/data/umdatul-ahkam.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "jurumiyah"
        label: "Matan Jurumiyah"
        file: "content/materi/data/jurumiyah.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "mutammimah"
        label: "Mutammimah"
        file: "content/materi/data/mutammimah.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "tashrif"
        label: "Kaedah-kaedah Tashrif"
        file: "content/materi/data/tashrif.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "wazan"
        label: "Wazan-wazan Shorf"
        file: "content/materi/data/wazan.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "siroh-nabawi"
        label: "Siroh Nabawi"
        file: "content/materi/data/siroh-nabawi.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "siroh-sahabat"
        label: "Siroh Sahabat"
        file: "content/materi/data/siroh-sahabat.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

  - name: "coming-soon"
    label: "Coming Soon"
    files:
      - name: "coming-soon"
        label: "Halaman Coming Soon"
        file: "content/coming-soon/coming-soon.json"
        fields:
          - {name: "judul", label: "Judul", widget: "string"}
          - {name: "deskripsi", label: "Deskripsi", widget: "text"}
          - name: "berita"
            label: "Daftar Berita"
            widget: "list"
            summary: "{{fields.judul}}"
            fields:
              - {name: "id", label: "ID (huruf kecil, tanpa spasi)", widget: "string"}
              - {name: "judul", label: "Judul Berita", widget: "string"}
              - {name: "deskripsi", label: "Deskripsi", widget: "text"}
              - name: "status"
                label: "Status"
                widget: "select"
                options: ["voting", "aktif", "selesai"]
              - name: "items"
                label: "Item-item"
                widget: "list"
                required: false
                summary: "{{fields.nama}}"
                fields:
                  - {name: "id", label: "ID", widget: "string"}
                  - {name: "nama", label: "Nama", widget: "string"}
                  - {name: "subjudul", label: "Subjudul", widget: "string"}
                  - {name: "deskripsi", label: "Deskripsi", widget: "text"}
                  - {name: "link", label: "Link", widget: "string"}

  - name: "seo"
    label: "SEO"
    files:
      - name: "seo"
        label: "Deskripsi & Kata Kunci"
        file: "config/seo.json"
        fields:
          - name: "description"
            label: "Deskripsi Website"
            widget: "text"
            hint: "Teks singkat yang muncul di hasil pencarian Google (ideal 150-160 karakter)"
          - name: "keywords"
            label: "Kata Kunci Pencarian"
            widget: "string"
            hint: "Pisahkan dengan koma. Contoh: ilmu agama islam, manhaj salaf, tauhid"

  # ── DOA & DZIKIR ────────────────────────────────────────────
  - name: "doa-mgr"
    label: "🤲 Doa & Dzikir"
    files:
      - name: "dzikir-pagi"
        label: "🌅 Dzikir Pagi"
        file: "content/doa/data/dzikir-pagi.json"
        fields:
          - {name: "kategori", label: "Nama Kategori", widget: "string"}
          - {name: "waktu", label: "Keterangan Waktu", widget: "string", required: false}
          - name: "doa"
            label: "Daftar Doa/Dzikir"
            widget: "list"
            summary: "{{fields.judul}}"
            fields:
              - {name: "id", label: "ID (unik, contoh: dp01)", widget: "string"}
              - {name: "judul", label: "Judul", widget: "string"}
              - {name: "arab", label: "Teks Arab (berharakat)", widget: "text", hint: "Tulis dari kanan ke kiri, lengkap dengan harakat"}
              - {name: "latin", label: "Tulisan Latin", widget: "text"}
              - {name: "terjemahan", label: "Terjemahan", widget: "text"}
              - {name: "sumber", label: "Sumber", widget: "string", required: false, hint: "Contoh: HR. Muslim, no. 2723 / QS. Al-Baqarah: 255"}
              - {name: "jumlah", label: "Jumlah Bacaan", widget: "string", required: false, hint: "Contoh: 1x, 3x, 33x. Kosongkan jika tidak ada hitungan ulang."}
              - {name: "keterangan", label: "Keterangan/Faedah", widget: "text", required: false}

      - name: "dzikir-petang"
        label: "🌇 Dzikir Petang"
        file: "content/doa/data/dzikir-petang.json"
        fields:
          - {name: "kategori", label: "Nama Kategori", widget: "string"}
          - {name: "waktu", label: "Keterangan Waktu", widget: "string", required: false}
          - name: "doa"
            label: "Daftar Doa/Dzikir"
            widget: "list"
            summary: "{{fields.judul}}"
            fields:
              - {name: "id", label: "ID (unik, contoh: dp01)", widget: "string"}
              - {name: "judul", label: "Judul", widget: "string"}
              - {name: "arab", label: "Teks Arab (berharakat)", widget: "text", hint: "Tulis dari kanan ke kiri, lengkap dengan harakat"}
              - {name: "latin", label: "Tulisan Latin", widget: "text"}
              - {name: "terjemahan", label: "Terjemahan", widget: "text"}
              - {name: "sumber", label: "Sumber", widget: "string", required: false, hint: "Contoh: HR. Muslim, no. 2723 / QS. Al-Baqarah: 255"}
              - {name: "jumlah", label: "Jumlah Bacaan", widget: "string", required: false, hint: "Contoh: 1x, 3x, 33x. Kosongkan jika tidak ada hitungan ulang."}
              - {name: "keterangan", label: "Keterangan/Faedah", widget: "text", required: false}

      - name: "dzikir-sholat"
        label: "🕌 Dzikir Setelah Sholat"
        file: "content/doa/data/dzikir-sholat.json"
        fields:
          - {name: "kategori", label: "Nama Kategori", widget: "string"}
          - {name: "waktu", label: "Keterangan Waktu", widget: "string", required: false}
          - name: "doa"
            label: "Daftar Doa/Dzikir"
            widget: "list"
            summary: "{{fields.judul}}"
            fields:
              - {name: "id", label: "ID (unik, contoh: dp01)", widget: "string"}
              - {name: "judul", label: "Judul", widget: "string"}
              - {name: "arab", label: "Teks Arab (berharakat)", widget: "text", hint: "Tulis dari kanan ke kiri, lengkap dengan harakat"}
              - {name: "latin", label: "Tulisan Latin", widget: "text"}
              - {name: "terjemahan", label: "Terjemahan", widget: "text"}
              - {name: "sumber", label: "Sumber", widget: "string", required: false, hint: "Contoh: HR. Muslim, no. 2723 / QS. Al-Baqarah: 255"}
              - {name: "jumlah", label: "Jumlah Bacaan", widget: "string", required: false, hint: "Contoh: 1x, 3x, 33x. Kosongkan jika tidak ada hitungan ulang."}
              - {name: "keterangan", label: "Keterangan/Faedah", widget: "text", required: false}

      - name: "doa-harian"
        label: "🗓️ Doa Sehari-hari"
        file: "content/doa/data/doa-harian.json"
        fields:
          - {name: "kategori", label: "Nama Kategori", widget: "string"}
          - {name: "waktu", label: "Keterangan Waktu", widget: "string", required: false}
          - name: "doa"
            label: "Daftar Doa/Dzikir"
            widget: "list"
            summary: "{{fields.judul}}"
            fields:
              - {name: "id", label: "ID (unik, contoh: dp01)", widget: "string"}
              - {name: "judul", label: "Judul", widget: "string"}
              - {name: "arab", label: "Teks Arab (berharakat)", widget: "text", hint: "Tulis dari kanan ke kiri, lengkap dengan harakat"}
              - {name: "latin", label: "Tulisan Latin", widget: "text"}
              - {name: "terjemahan", label: "Terjemahan", widget: "text"}
              - {name: "sumber", label: "Sumber", widget: "string", required: false, hint: "Contoh: HR. Muslim, no. 2723 / QS. Al-Baqarah: 255"}
              - {name: "jumlah", label: "Jumlah Bacaan", widget: "string", required: false, hint: "Contoh: 1x, 3x, 33x. Kosongkan jika tidak ada hitungan ulang."}
              - {name: "keterangan", label: "Keterangan/Faedah", widget: "text", required: false}

      - name: "doa-munajat"
        label: "🤲 Doa-doa Munajat"
        file: "content/doa/data/doa-munajat.json"
        fields:
          - {name: "kategori", label: "Nama Kategori", widget: "string"}
          - {name: "waktu", label: "Keterangan Waktu", widget: "string", required: false}
          - name: "doa"
            label: "Daftar Doa/Dzikir"
            widget: "list"
            summary: "{{fields.judul}}"
            fields:
              - {name: "id", label: "ID (unik, contoh: dp01)", widget: "string"}
              - {name: "judul", label: "Judul", widget: "string"}
              - {name: "arab", label: "Teks Arab (berharakat)", widget: "text", hint: "Tulis dari kanan ke kiri, lengkap dengan harakat"}
              - {name: "latin", label: "Tulisan Latin", widget: "text"}
              - {name: "terjemahan", label: "Terjemahan", widget: "text"}
              - {name: "sumber", label: "Sumber", widget: "string", required: false, hint: "Contoh: HR. Muslim, no. 2723 / QS. Al-Baqarah: 255"}
              - {name: "jumlah", label: "Jumlah Bacaan", widget: "string", required: false, hint: "Contoh: 1x, 3x, 33x. Kosongkan jika tidak ada hitungan ulang."}
              - {name: "keterangan", label: "Keterangan/Faedah", widget: "text", required: false}

  # ── KUTIPAN ─────────────────────────────────────────────────
  - name: "kutipan-mgr"
    label: "💬 Kutipan"
    files:
      - name: "kutipan"
        label: "Kutipan & Ulama"
        file: "content/kutipan/data/kutipan.json"
        fields:

          - name: "ulama"
            label: "👤 Daftar Ulama"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID (PascalCase, tanpa spasi)", widget: "string", hint: "Contoh: IbnulQoyyim. Dipakai untuk menghubungkan ke kutipan."}
              - {name: "nama", label: "Nama Tampil", widget: "string", hint: "Contoh: Ibnul Qoyyim Al-Jauziyah"}
              - {name: "nama_lengkap", label: "Nama Lengkap", widget: "string"}
              - {name: "kuniyah", label: "Kuniyah", widget: "string", required: false}
              - {name: "lahir", label: "Lahir (tempat, tahun H/M)", widget: "string"}
              - {name: "wafat", label: "Wafat (tahun H/M, tempat)", widget: "string"}
              - {name: "bio", label: "Biografi Singkat", widget: "text"}
              - name: "guru"
                label: "Guru-guru"
                widget: "list"
                required: false
              - name: "murid"
                label: "Murid-murid"
                widget: "list"
                required: false
              - name: "kitab_karangan"
                label: "Kitab Karangan"
                widget: "list"
                required: false
                summary: "{{fields.judul}}"
                fields:
                  - {name: "judul", label: "Judul Kitab", widget: "string"}
                  - {name: "topik", label: "Topik/Bahasan", widget: "string"}

          - name: "kutipan"
            label: "📜 Daftar Kutipan"
            widget: "list"
            summary: "{{fields.id}} — {{fields.teks}}"
            fields:
              - {name: "id", label: "ID (contoh: k201)", widget: "string", hint: "Harus unik, format: k diikuti angka 3 digit"}
              - name: "ulama"
                label: "Ulama Pemilik Kutipan"
                widget: "relation"
                collection: "kutipan-mgr"
                file: "kutipan"
                value_field: "ulama.*.id"
                search_fields: ["ulama.*.nama", "ulama.*.id"]
                display_fields: ["ulama.*.nama"]
                hint: "Dipilih dari Daftar Ulama di atas. Kalau ulama yang dicari belum ada, tambah dulu di Daftar Ulama lalu simpan."
              - name: "tema"
                label: "Tema"
                widget: "relation"
                collection: "kutipan-mgr"
                file: "kutipan"
                value_field: "tema_list.*.id"
                search_fields: ["tema_list.*.label", "tema_list.*.id"]
                display_fields: ["tema_list.*.label"]
                hint: "Dipilih dari Daftar Tema di bawah. Tambah tema baru di bagian Daftar Tema lalu simpan, baru akan muncul di sini."
              - {name: "arab", label: "Teks Arab (berharakat)", widget: "text", hint: "Tulis dari kanan ke kiri, lengkap dengan harakat"}
              - {name: "teks", label: "Terjemah Indonesia", widget: "text"}
              - {name: "kitab", label: "Nama Kitab", widget: "string"}
              - {name: "bab", label: "Bab/Pembahasan", widget: "string", required: false, hint: "Kosongkan ( — ) jika tidak yakin"}
              - {name: "jilid", label: "Jilid", widget: "string", required: false, hint: "Kosongkan ( — ) jika tidak yakin"}
              - {name: "halaman", label: "Halaman", widget: "string", required: false, hint: "Kosongkan ( — ) jika tidak yakin"}
              - name: "faedah"
                label: "Faedah (poin-poin pelajaran)"
                widget: "list"
              - name: "verifikasi"
                label: "Status Verifikasi"
                widget: "select"
                default: "belum_diverifikasi"
                options:
                  - {label: "✓ Terverifikasi", value: "terverifikasi"}
                  - {label: "⚠ Perlu Ditinjau", value: "perlu_ditinjau"}
                  - {label: "✗ Tidak Benar", value: "tidak_benar"}
                  - {label: "∅ Tidak Ditemukan (sudah dicari)", value: "tidak_ditemukan"}
                  - {label: "? Belum Diverifikasi", value: "belum_diverifikasi"}
              - name: "catatan_verifikasi"
                label: "Catatan Verifikasi"
                widget: "text"
                required: false
                hint: "Wajib diisi jika status bukan 'Terverifikasi' atau 'Belum Diverifikasi'. Jelaskan temuan/masalahnya."

          - name: "tema_list"
            label: "🏷️ Daftar Tema"
            widget: "list"
            summary: "{{fields.icon}} {{fields.label}}"
            hint: "Tambah, edit, atau hapus tema di sini. Perubahan langsung muncul di pilihan dropdown Tema pada Daftar Kutipan di atas, dan juga di sidebar tema pada halaman website."
            fields:
              - {name: "id", label: "ID (huruf kecil, tanpa spasi)", widget: "string", hint: "Contoh: tauhid, hati, ilmu. Dipakai sistem, jangan diubah-ubah setelah dipakai banyak kutipan."}
              - {name: "label", label: "Nama Tampil", widget: "string", hint: "Contoh: Tauhid & Aqidah"}
              - {name: "icon", label: "Ikon (emoji)", widget: "string", required: false, hint: "Contoh: ☀️ — kosongkan jika tidak ada"}

  # ── CERAMAH ─────────────────────────────────────────────────
  - name: "ceramah-index-mgr"
    label: "🗂️ Ceramah — Daftar ID"
    files:
      - name: "ceramah-index"
        label: "Daftar ID Ceramah (urutan tampil)"
        file: "content/ceramah/data/ceramah-index.json"
        fields:
          - name: "ids"
            label: "ID Ceramah"
            widget: "list"
            hint: "Tambah ID baru di sini setiap kali menambah ceramah. Urutan di sini = urutan tampil."

  - name: "ceramah"
    label: "🎙️ Ceramah — Isi"
    folder: "content/ceramah/data/items"
    create: true
    delete: true
    identifier_field: "id"
    summary: "{{fields.judul}}"
    extension: "json"
    format: "json"
    fields:
      - name: "id"
        label: "ID (contoh: c051)"
        widget: "string"
        hint: "ID unik, huruf kecil tanpa spasi, contoh: c051"

      - name: "judul"
        label: "Judul Ceramah"
        widget: "string"

      - name: "jenis"
        label: "Jenis"
        widget: "select"
        options:
